name: Update PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**/*.md'
      - 'scripts/generate_pdfs.sh'
      - '.github/workflows/update-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pdfs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex lmodern

      - name: Generate admin PDFs
        run: |
          chmod +x scripts/generate_pdfs.sh
          scripts/generate_pdfs.sh

      - name: Commit updated PDFs
        run: |
          if ! git status --porcelain -- ':(glob)admin_pdfs/**/*.pdf' | grep -q .; then
            echo "No PDF changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ':(glob)admin_pdfs/**/*.pdf'
          git commit -m "chore: update generated PDFs [skip ci]"
          git push


